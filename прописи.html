            background: #fff; padding: 20px; border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 25px;
        }
        textarea {
            width: 100%; padding: 12px; font-size: 20px;
            border: 2px solid #e0b0b0; border-radius: 10px;
            margin-bottom: 12px; resize: vertical; min-height: 90px;
        }
        button {
            background: #c0392b; color: #fff; border: none;
            padding: 12px 22px; font-size: 15px; border-radius: 10px;
            cursor: pointer; margin: 4px 4px 4px 0;
        }
        button:hover { background: #a93226; }
        .controls { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; margin-top: 8px; }
        .controls label { font-size: 14px; }
        .word-block {
            background: #fff; border-radius: 15px; padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 25px;
        }
        .word-header {
            text-align: center; margin-bottom: 15px;
            border-bottom: 2px dashed #e0b0b0; padding-bottom: 12px;
            display: flex; align-items: baseline; justify-content: center;
            gap: 14px; flex-wrap: wrap;
        }
        .word-hanzi { font-size: 40px; color: #2c3e50; letter-spacing: normal; }
        .word-pinyin { font-size: 22px; color: #16a085; letter-spacing: normal; }
        .word-translation { font-size: 20px; color: #7f8c8d; font-style: italic; }        .chars-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 18px; }
        .char-card { background: #fdfdfd; border: 1px solid #eee; border-radius: 12px; padding: 12px; text-align: center; width: 200px; }
        .char-pinyin { font-size: 18px; color: #16a085; margin-bottom: 4px; }
        .grid-wrap { position: relative; width: 170px; height: 170px; margin: 0 auto; }
        .tianzige {
            position: absolute; top: 0; left: 0; width: 170px; height: 170px;
            border: 2px solid #e07b7b; pointer-events: none; z-index: 0;
        }
        .tianzige .v { position:absolute; left:50%; top:0; width:0; height:100%; border-left:1px dashed #e07b7b; }
        .tianzige .h { position:absolute; top:50%; left:0; height:0; width:100%; border-top:1px dashed #e07b7b; }
        .char-radical { font-size: 13px; color: #168F16; margin-top: 8px; line-height: 1.4; }
        .card-buttons button { padding: 6px 10px; font-size: 12px; margin-top: 8px; }
        .hint { text-align: center; color: #999; font-size: 14px; margin-top: 10px; }
        .save-word-btn { background: #16a085 !important; }
        .save-word-btn:hover { background: #12876f !important; }
        .print-btn { background: #2980b9 !important; }
        .print-btn:hover { background: #216a9c !important; }
    </style>
</head>

            <button onclick="generate()">Создать прописи</button>
            <div class="controls">
                <label>🐢 Скорость:
                    <input type="range" id="speedRange" min="0.1" max="1.5" step="0.1" value="0.6">
                    <span id="speedValue">0.6</span>
                </label>
                <button onclick="downloadAll()">📥 Скачать всё картинкой</button>
                <button class="print-btn" onclick="makeWorksheet()">🖨️ Скачать прописи (пустые клетки)</button>
            </div>
            <p class="hint">
                Формат: <b>иероглифы | перевод</b>. 🟢 Ключ выделен зелёным + его значение внизу карточки.<br>
                На карточке: 🔄 повтор, 🔁 зациклить, ✍️ прописать.
            </p>
        </div>

        <div id="output"></div>
    </div>

        speedRange.oninput = () => speedValue.textContent = speedRange.value;

        function getPinyin(text) {
            try { return pinyinPro.pinyin(text, { toneType: 'symbol' }); }
            catch (e) { return ''; }
        }

        function tianzige() {
            return '<div class="tianzige"><div class="v"></div><div class="h"></div></div>';
        }

        // Загружаем данные иероглифа, чтобы узнать его настоящий ключ
        function loadCharData(char) {
            return fetch('https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/' + char + '.json')
                .then(r => r.json())
                .catch(() => fetch('https://unpkg.com/hanzi-writer-data@2.0/' + char + '.json').then(r => r.json()));
        }

        function findRadical(ch) {
            for (const r in RADICALS) {
                if (ch.includes(r) && r !== ch) return r;
            }
            if (RADICALS[ch]) return ch;
            return null;
        }

        function generate() {
            const raw = document.getElementById('wordsInput').value.trim();
            const output = document.getElementById('output');
            output.innerHTML = '';
            if (!raw) return;

            const lines = raw.split('\n').map(l => l.trim()).filter(l => l);
            const speed = parseFloat(speedRange.value);

            lines.forEach((line, wIndex) => {
                let parts = line.split('|').map(s => s ? s.trim() : '');
                const word = parts[0] || '';
                const transPart = parts[1] || '';
                const chars = Array.from(word).filter(ch => /[\u4e00-\u9fff]/.test(ch));
                if (chars.length === 0) return;

                const block = document.createElement('div');
                block.className = 'word-block';

                const header = document.createElement('div');
                header.className = 'word-header';
                header.innerHTML =
                    '<span class="word-hanzi">' + word + '</span>' +
                    '<span class="word-pinyin">' + getPinyin(word) + '</span>' +
                    (transPart ? '<span class="word-translation">' + transPart + '</span>' : '');
                block.appendChild(header);

                const grid = document.createElement('div');
                grid.className = 'chars-grid';
                block.appendChild(grid);

                const saveWrap = document.createElement('div');
                saveWrap.style.textAlign = 'center';
                saveWrap.style.marginTop = '12px';
                const saveBtn = document.createElement('button');
                saveBtn.className = 'save-word-btn';
                saveBtn.textContent = '📥 Скачать это слово';
                saveBtn.onclick = () => downloadBlock(block, word);
                saveWrap.appendChild(saveBtn);
                block.appendChild(saveWrap);

                output.appendChild(block);

                chars.forEach((ch, cIndex) => {
                    const card = document.createElement('div');
                    card.className = 'char-card';

                    const py = document.createElement('div');
                    py.className = 'char-pinyin';
                    py.textContent = getPinyin(ch);
                    card.appendChild(py);

                    const gwrap = document.createElement('div');
                    gwrap.className = 'grid-wrap';
                    gwrap.innerHTML = tianzige();
                    const target = document.createElement('div');
                    const targetId = 'char-' + wIndex + '-' + cIndex;
                    target.id = targetId;
                    target.style.position = 'relative';
                    target.style.zIndex = '1';
                    gwrap.appendChild(target);
                    card.appendChild(gwrap);

                    const radicalInfo = document.createElement('div');
                    radicalInfo.className = 'char-radical';
                    radicalInfo.innerHTML = '⏳ определяем ключ…';
                    card.appendChild(radicalInfo);

                    // определяем ключ через данные HanziWriter
                    loadCharData(ch).then(data => {
                        let radChar = null;
                        if (data && data.radStrokes && data.strokes) {
                            // radical часто хранится отдельно — берём из локальной таблицы
                        }
                        const found = findRadical(ch);
                        if (found && RADICALS[found]) {
                            radicalInfo.innerHTML =
                                '🟢 Ключ: <b style="font-size:20px;">' + found + '</b> [' +
                                RADICALS[found].py + '] — ' + RADICALS[found].mean;
                        } else {
                            radicalInfo.innerHTML = '🟢 Ключ выделен зелёным';
                        }
                    }).catch(() => {
                        const found = findRadical(ch);
                        radicalInfo.innerHTML = found
                            ? '🟢 Ключ: <b>' + found + '</b> [' + RADICALS[found].py + '] — ' + RADICALS[found].mean
                            : '🟢 Ключ выделен зелёным';
                    });

                    const btnDiv = document.createElement('div');
                    btnDiv.className = 'card-buttons';
                    card.appendChild(btnDiv);

                    grid.appendChild(card);

                    const writer = HanziWriter.create(targetId, ch, {
                        width: 170, height: 170, padding: 5,
                        showOutline: true,
                        strokeAnimationSpeed: speed,
                        delayBetweenStrokes: 400,
                        strokeColor: '#2c3e50',
                        outlineColor: '#dddddd',
                        radicalColor: '#168F16'
                    });
                    writer.animateCharacter();

                    const replayBtn = document.createElement('button');
                    replayBtn.textContent = '🔄 Повтор';
                    replayBtn.onclick = () => writer.animateCharacter();
                    btnDiv.appendChild(replayBtn);

                    const loopBtn = document.createElement('button');
                    loopBtn.textContent = '🔁 Зациклить';
                    let looping = false;
                    loopBtn.onclick = () => {
                        looping = !looping;
                        if (looping) {
                            loopBtn.textContent = '⏹️ Стоп';
                            loopBtn.style.background = '#e67e22';
                            const loop = () => {
                                if (!looping) return;
                                writer.animateCharacter({ onComplete: () => {
                                    if (looping) setTimeout(loop, 800);
                                }});
                            };
                            loop();
                        } else {
                            loopBtn.textContent = '🔁 Зациклить';
                            loopBtn.style.background = '';
                        }
                    };
                    btnDiv.appendChild(loopBtn);

                    const quizBtn = document.createElement('button');
                    quizBtn.textContent = '✍️ Прописать';
                    quizBtn.onclick = () => writer.quiz();
                    btnDiv.appendChild(quizBtn);
                });
            });

            if (!output.innerHTML) {
                output.innerHTML = '<p style="color:#c0392b;text-align:center;">Не найдено китайских иероглифов.</p>';
            }
        }

                const link = document.createElement('a');

        // ==== PDF ПРОПИСИ в стиле Haohan ====
        async function makeWorksheet() {
            const raw = document.getElementById('wordsInput').value.trim();
            if (!raw) { alert('Сначала введите слова!'); return; }

            const title = prompt('Название урока (сверху страницы):', 'Урок 1');
            const lines = raw.split('\n').map(l => l.trim()).filter(l => l);

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ unit: 'mm', format: 'a4' });
            const pageW = 210, pageH = 297;
            const marginL = 15, marginT = 15;
            const cell = 15;          // размер клетки, мм
            const cols = 11;          // сколько клеток в ряду
            const usableW = cell * cols;

            let y = marginT;

            // Заголовок урока
            doc.setTextColor(200, 40, 40);
            doc.setFontSize(14);
            doc.text(title || 'Урок', marginL, y);
            doc.setTextColor(200, 40, 40);
            doc.setFontSize(11);
            doc.text('Haohan-style', pageW - marginL, y, { align: 'right' });
            y += 8;

            for (const line of lines) {
                const parts = line.split('|').map(s => s ? s.trim() : '');
                const word = parts[0] || '';
                const transPart = parts[1] || '';
                const chars = Array.from(word).filter(ch => /[\u4e00-\u9fff]/.test(ch));
                if (chars.length === 0) continue;

                // Подпись слова: [pinyin] - перевод
                if (y + 8 > pageH - marginT) { doc.addPage(); y = marginT; }
                doc.setTextColor(200, 40, 40);
                doc.setFontSize(11);
                doc.text('[' + getPinyin(word) + '] - ' + transPart, marginL, y);
                y += 4;

                for (const ch of chars) {
                    // высота одной строки = подпись пиньиня клетки + ряд клеток
                    const rowH = 6 + cell;
                    if (y + rowH > pageH - marginT) { doc.addPage(); y = marginT; }

                    // маленькая рамка с пиньинем над рядом
                    doc.setDrawColor(60);
                    doc.setLineWidth(0.3);
                    doc.rect(marginL, y, 20, 6);
                    doc.setTextColor(30);
                    doc.setFontSize(9);
                    doc.text('[' + getPinyin(ch) + ']', marginL + 2, y + 4);
                    y += 6;

                    // получаем этапы написания (нарастающие штрихи) как картинки
                    const steps = await renderStrokeSteps(ch, cols);

                    // рисуем клетки
                    for (let i = 0; i < cols; i++) {
                        const x = marginL + i * cell;
                        // внешняя рамка
                        doc.setDrawColor(210, 120, 120);
                        doc.setLineWidth(0.4);
                        doc.rect(x, y, cell, cell);
                        // пунктир крест
                        doc.setDrawColor(230, 170, 170);
                        doc.setLineWidth(0.15);
                        doc.setLineDashPattern([1, 1], 0);
                        doc.line(x + cell / 2, y, x + cell / 2, y + cell);
                        doc.line(x, y + cell / 2, x + cell, y + cell / 2);
                        doc.setLineDashPattern([], 0);
                        // картинка этапа
                        if (steps[i]) {
                            doc.addImage(steps[i], 'PNG', x + 0.5, y + 0.5, cell - 1, cell - 1);
                        }
                    }
                    y += cell + 3;
                }
                y += 3;
            }

            doc.save('прописи.pdf');
        }

        // Рисует нарастающие этапы написания иероглифа -> массив dataURL картинок
        async function renderStrokeSteps(char, count) {
            const data = await loadCharData(char);
            const size = 120;
            const result = [];
            if (!data || !data.strokes) {
                // если нет данных — первая клетка серый иероглиф текстом, остальные пустые
                for (let i = 0; i < count; i++) result.push(null);
                return result;
            }
            const total = data.strokes.length;

            for (let i = 0; i < count; i++) {
                const canvas = document.createElement('canvas');
                canvas.width = size; canvas.height = size;
                const ctx = canvas.getContext('2d');
                // HanziWriter использует систему координат 1024 с инверсией Y
                const scale = size / 1024;
                ctx.setTransform(scale, 0, 0, -scale, 0, size);

                let strokesToShow;
                if (i === 0) strokesToShow = total;      // 1-я клетка = полный иероглиф
                else strokesToShow = i;                  // затем 1, 2, 3... штриха
                if (strokesToShow > total) { result.push(null); continue; }

                for (let s = 0; s < strokesToShow; s++) {
                    ctx.fillStyle = (i === 0) ? '#555' : '#bbb';
                    const p = new Path2D(data.strokes[s]);
                    ctx.fill(p);
                }
                result.push(canvas.toDataURL('image/png'));
            }
            return result;
        }

        window.onload = () => {
            document.getElementById('wordsInput').value = '你好 | привет\n学习 | учиться';
            generate();
        };
    </script>
